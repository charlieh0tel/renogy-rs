name: Build Debian Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb-collector:
    uses: charlieh0tel/deb-workflows/.github/workflows/rust-build-deb.yml@main
    with:
      package: renogy-collector
      build-deps: "libdbus-1-dev"
      artifact-suffix: collector
    secrets: inherit

  build-deb-aprs:
    uses: charlieh0tel/deb-workflows/.github/workflows/rust-build-deb.yml@main
    with:
      package: renogy-aprs
      build-deps: "libdbus-1-dev"
      artifact-suffix: aprs
    secrets: inherit

  build-deb-archiver:
    uses: charlieh0tel/deb-workflows/.github/workflows/rust-build-deb.yml@main
    with:
      package: renogy-archiver
      artifact-suffix: archiver
    secrets: inherit

  build-deb-puller:
    uses: charlieh0tel/deb-workflows/.github/workflows/rust-build-deb.yml@main
    with:
      package: renogy-archiver-puller
      artifact-suffix: puller
    secrets: inherit

  tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev rsync
      - name: Run workspace unit + integration tests
        run: cargo test --workspace
      - name: Run gated system tests
        run: |
          cargo test -p renogy-archiver --test system -- --ignored
          cargo test -p renogy-archiver-puller --test pull -- --ignored
